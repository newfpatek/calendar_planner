<!DOCTYPE html>
<html>
<head>
    <title>Firestore Test</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPRlqcDczA1z-W5VI3kE-8CS7Plu9oxg8",
            authDomain: "calendarplanneri122.firebaseapp.com",
            projectId: "calendarplanneri122",
            storageBucket: "calendarplanneri122.firebasestorage.app",
            messagingSenderId: "293231163975",
            appId: "1:293231163975:web:fe687b476ac795d6c88f62",
            measurementId: "G-Q2N11MQ7BJ"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Функция для тестирования
        async function testFirestore() {
            try {
                const testEvent = {
                    id: Date.now(),
                    title: "Тестовое событие",
                    date: new Date().toISOString(),
                    time: "12:00",
                    description: "Это тестовое событие для проверки Firestore"
                };

                console.log("Создаем тестовое событие:", testEvent);

                // Сохраняем событие
                const eventRef = doc(db, 'events', 'test_user');
                console.log("Ссылка на документ:", eventRef.path);

                const eventDoc = await getDoc(eventRef);
                console.log("Документ существует?", eventDoc.exists());
                
                if (!eventDoc.exists()) {
                    console.log("Создаем новый документ с событием");
                    await setDoc(eventRef, {
                        events: [testEvent]
                    });
                } else {
                    console.log("Документ существует, добавляем событие");
                    const currentEvents = eventDoc.data().events || [];
                    console.log("Текущие события:", currentEvents);
                    await setDoc(eventRef, {
                        events: [...currentEvents, testEvent]
                    });
                }

                // Получаем события
                console.log("Получаем обновленный документ");
                const updatedDoc = await getDoc(eventRef);
                console.log("Обновленный документ существует?", updatedDoc.exists());
                
                if (updatedDoc.exists()) {
                    const data = updatedDoc.data();
                    console.log("Данные документа:", data);
                    const events = data.events || [];
                    console.log("События из документа:", events);

                    document.getElementById('result').textContent = JSON.stringify({
                        success: true,
                        events: events,
                        documentData: data
                    }, null, 2);
                } else {
                    document.getElementById('result').textContent = JSON.stringify({
                        success: false,
                        error: "Документ не существует после сохранения"
                    }, null, 2);
                }
            } catch (error) {
                console.error("Ошибка:", error);
                document.getElementById('result').textContent = JSON.stringify({
                    success: false,
                    error: error.message,
                    stack: error.stack
                }, null, 2);
            }
        }

        // Добавляем обработчик для кнопки
        window.testFirestore = testFirestore;
    </script>
</head>
<body>
    <h1>Firestore Test</h1>
    <button onclick="testFirestore()" style="padding: 10px 20px; font-size: 16px;">Тест Firestore</button>
    <pre id="result" style="margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 4px;"></pre>
</body>
</html>
